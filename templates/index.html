<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustChain - Compliance Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-bright: #60a5fa;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #334155;
        }

        body {
            font-family: 'Courier Prime', 'JetBrains Mono', 'Fira Code', monospace;
            background: linear-gradient(135deg, var(--primary) 0%, #1a2744 50%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #1a2744 100%);
            color: var(--text-primary);
            padding: 60px 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent-bright), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.8s ease-out;
        }

        .header p {
            font-size: 0.95em;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content {
            padding: 50px 40px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .button-group {
            text-align: center;
            margin-bottom: 40px;
        }

        button {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-bright) 100%);
            color: white;
            border: 1px solid var(--accent-bright);
            padding: 14px 32px;
            font-size: 0.95em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            font-family: 'Courier Prime', monospace;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        button:hover:not(:disabled)::before {
            left: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.3), 0 0 20px rgba(59, 130, 246, 0.15);
        }

        button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .secondary-btn {
            background: transparent;
            color: var(--accent-bright);
            border: 1px solid var(--accent);
            margin-left: 10px;
        }

        .secondary-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
        }

        .status-section {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85em;
        }

        .status-section::-webkit-scrollbar {
            width: 6px;
        }

        .status-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .status-section::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .status-title {
            font-weight: 600;
            color: var(--accent-bright);
            margin-bottom: 12px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-item {
            padding: 6px 0;
            color: var(--text-secondary);
            font-size: 0.85em;
            border-bottom: 1px solid rgba(52, 65, 84, 0.5);
            font-family: 'Courier Prime', monospace;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-item.success {
            color: var(--success);
        }

        .status-item.error {
            color: var(--error);
        }

        .spinner {
            border: 2px solid rgba(59, 130, 246, 0.1);
            border-top: 2px solid var(--accent-bright);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-container {
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }

        .results-container.show {
            display: block;
        }

        .result-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .result-section:hover {
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1), inset 0 1px 0 rgba(96, 165, 250, 0.05);
        }

        .result-header {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .result-header h3 {
            font-size: 1.1em;
            color: var(--text-primary);
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .model-tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .gpt4-tag {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        .claude-tag {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .gemini-tag {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .result-content {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier Prime', 'JetBrains Mono', monospace;
            font-size: 0.85em;
            line-height: 1.7;
            color: var(--text-secondary);
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .result-content::-webkit-scrollbar {
            width: 6px;
        }

        .result-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .result-content::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .action-buttons {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
        }

        .error-message.show {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        .loading-message {
            text-align: center;
            color: var(--accent-bright);
            font-weight: 600;
            margin: 20px 0;
            display: none;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .loading-message.show {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .toggle-label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: background-color 0.4s;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-primary);
            transition: transform 0.4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(28px);
        }

        .mode-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            min-width: 120px;
            letter-spacing: 0.3px;
        }

        select {
            background: var(--primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: 'Courier Prime', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        select option {
            background: var(--primary);
            color: var(--text-primary);
        }

        label {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        div[style*="margin-bottom: 20px"] {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 TrustChain</h1>
            <p>Automated Compliance Evidence Gathering with Multi-Model AI</p>
        </div>

        <div class="content">
            <div class="mode-toggle">
                <span class="toggle-label">Data Mode:</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="demoModeToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
                <span class="mode-label" id="modeLabel">Demo (Mock Data)</span>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-weight: 600; color: #333; margin-right: 10px;">Select Scenario:</label>
                <select id="scenarioSelect" style="padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 1em;">
                    <option value="healthy">✅ Healthy Organization</option>
                    <option value="needs_improvement">📈 Needs Improvement</option>
                    <option value="post_incident">🚨 Post-Incident Recovery</option>
                    <option value="non_compliant">❌ Non-Compliant</option>
                    <option value="recovering">⬆️ Recovering</option>
                </select>
            </div>

            <div class="button-group">
                <button id="collectBtn" onclick="collectEvidence()">
                    📊 Collect Evidence (Multi-Model Pipeline)
                </button>
            </div>

            <div class="error-message" id="errorMsg"></div>
            <div class="loading-message" id="loadingMsg">
                <span class="spinner"></span>
                Collecting evidence...
            </div>

            <div class="status-section">
                <div class="status-title">📋 Status Updates</div>
                <div id="statusList"></div>
            </div>

            <div class="results-container" id="resultsContainer">
                <!-- GPT-4 Results -->
                <div class="result-section">
                    <div class="result-header">
                        <h3>📊 Structured Data Extraction</h3>
                        <span class="model-tag gpt4-tag">GPT-4o-mini</span>
                    </div>
                    <div class="result-content" id="extractedContent">Loading...</div>
                </div>

                <!-- Claude Results -->
                <div class="result-section">
                    <div class="result-header">
                        <h3>🔍 Compliance Risk Analysis</h3>
                        <span class="model-tag claude-tag">Claude</span>
                    </div>
                    <div class="result-content" id="analysisContent">Loading...</div>
                </div>

                <!-- Gemini Results -->
                <div class="result-section">
                    <div class="result-header">
                        <h3>📄 Audit-Ready Report</h3>
                        <span class="model-tag gemini-tag">Gemini</span>
                    </div>
                    <div class="result-content" id="reportContent">Loading...</div>
                </div>

                <div class="action-buttons">
                    <button class="secondary-btn" onclick="downloadPackage()">⬇️ Download Package</button>
                    <button onclick="collectEvidence()">🔄 Regenerate</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('demoModeToggle').addEventListener('change', function() {
            const modeLabel = document.getElementById('modeLabel');
            if (this.checked) {
                modeLabel.textContent = 'Demo (Mock Data)';
            } else {
                modeLabel.textContent = 'Real (GitHub API)';
            }
        });

        async function collectEvidence() {
            const btn = document.getElementById('collectBtn');
            const errorMsg = document.getElementById('errorMsg');
            const loadingMsg = document.getElementById('loadingMsg');
            const statusList = document.getElementById('statusList');
            const resultsContainer = document.getElementById('resultsContainer');
            const demoMode = document.getElementById('demoModeToggle').checked;
            const scenario = document.getElementById('scenarioSelect').value;

            btn.disabled = true;
            errorMsg.classList.remove('show');
            errorMsg.textContent = '';
            loadingMsg.classList.add('show');
            statusList.innerHTML = '';
            resultsContainer.classList.remove('show');

            try {
                const response = await fetch('/api/collect', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ demo_mode: demoMode, scenario: scenario })
                });

                const data = await response.json();

                if (data.status_updates) {
                    data.status_updates.forEach(update => {
                        const item = document.createElement('div');
                        item.className = 'status-item';
                        if (update.message.includes('ERROR')) {
                            item.classList.add('error');
                        } else if (update.message.includes('✓')) {
                            item.classList.add('success');
                        }
                        item.textContent = update.message;
                        statusList.appendChild(item);
                    });
                }

                if (!data.success) {
                    throw new Error(data.error || 'Evidence collection failed');
                }

                document.getElementById('extractedContent').textContent =
                    JSON.stringify(data.extracted_data, null, 2);
                document.getElementById('analysisContent').textContent =
                    data.risk_analysis;
                document.getElementById('reportContent').textContent =
                    data.audit_report;

                resultsContainer.classList.add('show');
            } catch (error) {
                console.error('Error:', error);
                errorMsg.textContent = `Error: ${error.message}`;
                errorMsg.classList.add('show');
            } finally {
                btn.disabled = false;
                loadingMsg.classList.remove('show');
            }
        }

        function downloadPackage() {
            const extracted = document.getElementById('extractedContent').textContent;
            const analysis = document.getElementById('analysisContent').textContent;
            const report = document.getElementById('reportContent').textContent;

            const content = `TRUSTCHAIN EVIDENCE PACKAGE
Generated: ${new Date().toISOString()}

=== STRUCTURED DATA EXTRACTION (GPT-4) ===
${extracted}

=== COMPLIANCE RISK ANALYSIS (Claude) ===
${analysis}

=== AUDIT REPORT (Gemini) ===
${report}`;

            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `soc2-evidence-${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        window.addEventListener('load', () => {
            fetch('/api/health')
                .then(r => r.json())
                .then(data => {
                    if (!data.tokenrouter_configured) {
                        document.getElementById('errorMsg').textContent =
                            'Warning: TokenRouter API key not configured';
                        document.getElementById('errorMsg').classList.add('show');
                    }
                });
        });
    </script>
</body>
</html>
